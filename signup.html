<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LangUp - Criar Conta</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="login-background"> <div class="container-fluid">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card shadow-lg border-0 rounded-4 my-5">
                    <div class="card-body p-4 p-md-5 text-center">

                        <picture>
                            <source srcset="images/logo_LangUp.webp" type="image/webp">
                            <source srcset="images/logo_LangUp.png" type="image/png">
                            <img src="images/logo_LangUp.png" alt="Logo LangUp" class="header-logo img-fluid mb-4">
                        </picture>

                        <h2 class="fw-bold mb-2">Crie sua conta</h2>
                        <p class="text-body-secondary mb-4">Preencha os dados para começar a aprender.</p>

                        <form id="signup-form">
                            
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nome" placeholder="Seu nome" required autofocus>
                                <label for="nome">Nome Completo</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                                <label for="email">E-mail</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                                <label for="telefone">Telefone (WhatsApp)</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="senha" placeholder="Senha" required minlength="6">
                                <label for="senha">Senha</label>
                            </div>

                            <div class="d-grid mb-3">
                                <button class="btn btn-primary btn-lg text-uppercase fw-bold" type="submit">Criar Conta</button>
                            </div>
                        </form>

                        <div class="my-4">
                            <span class="text-body-secondary">Já tem uma conta?</span>
                        </div>

                        <div class="d-grid">
                            <a href="index.html" class="btn btn-outline-secondary btn-lg text-uppercase fw-bold">Fazer Login</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <script src="js/signup.js"></script>

</body>
</html>
