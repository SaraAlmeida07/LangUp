    <header class="container d-lg-none bg-white shadow-sm fixed-top">
        <div class="d-flex align-items-center py-3">

    <main class="container mt-5">
        
        <div class="row justify-content-center mb-4">
            <div class="col-12">
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 rounded-start-4"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 rounded-end-4 py-2" placeholder="Pesquisar em meu vocabulário...">
                </div>
                
                <div class="d-flex gap-2 overflow-x-auto pb-2">
                    <select class="form-select form-select-sm rounded-pill w-auto bg-white border-0 shadow-sm" aria-label="Idioma">
                        <option selected>Idioma</option>
                        <option value="1">Inglês</option>
                        <option value="2">Espanhol</option>
                        <option value="3">Francês</option>
                    </select>
                    <select class="form-select form-select-sm rounded-pill w-auto bg-white border-0 shadow-sm" aria-label="Dificuldade">
                        <option selected>Dificuldade</option>
                        <option value="1">Fácil</option>
                        <option value="2">Médio</option>
                        <option value="3">Difícil</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="lista-palavras" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-3">
            <p class="text-center text-muted w-100 mt-5">Carregando suas palavras...</p>
